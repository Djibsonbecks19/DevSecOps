name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]

jobs:


  sast:
    name: "Job 1 - SAST Semgrep"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep SAST scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/app:/src \
            semgrep/semgrep semgrep --config=auto /src \
            --json --output /src/semgrep-report.json || true

      - name: Upload Semgrep artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: app/semgrep-report.json



  build:
    name: "Job 2 - Build Docker Image"
    runs-on: ubuntu-latest
    needs: sast

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/secure-app:latest .

      - name: Save image
        run: docker save ${{ secrets.DOCKER_USERNAME }}/secure-app:latest -o secure-app.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: secure-app.tar



  trivy:
    name: "Job 3 - Trivy Scan"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i secure-app.tar

      # Full report
      - name: Trivy full report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/secure-app:latest
          format: json
          output: trivy-report.json
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          exit-code: 0

      # Block CRITICAL
      - name: Trivy security gate
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/secure-app:latest
          format: table
          severity: CRITICAL
          exit-code: 1

      - name: Upload Trivy artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json



  nexus:
    name: "Job 4 - Publish to Nexus"
    runs-on: ubuntu-latest
    needs: trivy

    steps:
      - name: Download Trivy report
        uses: actions/download-artifact@v4
        with:
          name: trivy-report

      - name: Upload to Nexus (RAW repo)
        run: |
          curl -u admin:${{ secrets.NEXUS_PASSWORD }} \
            --upload-file trivy-report.json \
            "https://a571-2001-4278-11-e7c6-55db-58ef-dab3-3663.ngrok-free.app/repository/devsecops-report/trivy-${{ github.run_number }}.json"



  dockerhub:
    name: "Job 5 - Push to DockerHub"
    runs-on: ubuntu-latest
    needs: [sast, build, trivy, nexus]

    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i secure-app.tar

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/secure-app:latest