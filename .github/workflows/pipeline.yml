name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  sast:
    name: Security Scan (Semgrep)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Semgrep scan (report)
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" semgrep/semgrep \
          semgrep scan --config=auto --json --output /src/semgrep-report.json /src

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.json

      - name: Semgrep scan (blocking)
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" semgrep/semgrep \
          semgrep scan --config=auto --error /src